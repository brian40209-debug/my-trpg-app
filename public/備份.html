<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深淵與龍：極致 GM 輔助系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #0f1115;
            --panel-grey: #1c1e22;
            --border-runic: #3f444b;
            --accent-amber: #d4af37;
            --text-silver: #b0b4b8;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-deep);
            color: var(--text-silver);
            overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* 羊皮紙質感灰色漸變 */
        .parchment-grey {
            background: linear-gradient(135deg, #2c2f35 0%, #1c1e22 100%);
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .runic-border {
            border: 2px solid var(--border-runic);
            position: relative;
        }

        .runic-border::before {
            content: "ᚱᚢᚾᛖ";
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-deep);
            padding: 0 10px;
            color: var(--accent-amber);
            font-size: 12px;
            letter-spacing: 5px;
            opacity: 0.6;
        }

        /* 捲軸美化 */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #111; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border-runic); border-radius: 3px; }

        .btn-fantasy {
            background: linear-gradient(to bottom, #3a3f47, #24282e);
            border: 1px solid var(--border-runic);
            transition: all 0.3s;
            overflow: hidden;
        }

        .btn-fantasy:hover {
            border-color: var(--accent-amber);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            color: white;
        }

        .active-tab {
            color: var(--accent-amber) !important;
            border-left: 4px solid var(--accent-amber);
            background: rgba(212, 175, 55, 0.05);
        }

        .log-gm { border-left: 3px solid var(--accent-amber); padding-left: 1rem; margin-bottom: 1.5rem; color: #d1d5db; line-height: 1.7; }
        .log-player { text-align: right; color: #88929b; font-style: italic; margin-bottom: 1rem; }
        .log-system { background: rgba(255,255,255,0.03); text-align: center; font-size: 0.85rem; padding: 0.5rem; border-radius: 4px; margin: 1rem 0; color: var(--accent-amber); }

        .screen { display: none; }
        .screen.active { display: flex; }

        /* 骰子動畫 */
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(90deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .dice-rolling { animation: roll 0.6s ease-out; }
    </style>
</head>
<body class="h-screen w-screen">

    <div id="screen-main" class="screen active flex-col items-center justify-center h-full w-full">
        <div class="text-center mb-12">
            <h1 class="text-7xl font-black cinzel tracking-widest text-white mb-2">DUNGEONS</h1>
            <h1 class="text-5xl font-light cinzel tracking-widest text-amber-600 mb-6">& ABYSS</h1>
            <p class="text-gray-500 tracking-widest uppercase text-sm">Automated GM Oracle System</p>
            <div class="h-px w-64 bg-gradient-to-r from-transparent via-amber-700 to-transparent mx-auto mt-4"></div>
        </div>
        <div class="flex flex-col gap-4 w-72">
            <button onclick="initSetup()" class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 開始冒險
            </button>
            <button class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3 opacity-40 cursor-not-allowed">
                <i class="fa-solid fa-clock-rotate-left"></i> 繼續遊戲
            </button>
            <button onclick="window.close()" class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3">
                <i class="fa-solid fa-skull"></i> 離開世界
            </button>
        </div>
    </div>

    <div id="screen-setup" class="screen flex-col items-center justify-center h-full w-full p-10">
        <div class="parchment-grey runic-border w-full max-w-3xl rounded-lg p-10 flex flex-col h-[80vh]">
            <div id="setup-header" class="text-2xl text-amber-500 font-bold mb-6 border-b border-gray-700 pb-4 cinzel">
                Phase I: The Gathering
            </div>
            <div id="setup-body" class="flex-grow overflow-y-auto custom-scroll pr-4 space-y-6 text-lg">
                </div>
            <div id="setup-footer" class="mt-8 flex justify-end">
                </div>
        </div>
    </div>

    <div id="screen-game" class="screen h-full w-full flex overflow-hidden">
        
        <aside class="w-20 bg-black border-r border-gray-800 flex flex-col items-center py-8 gap-8">
            <button onclick="changeTab('adventure')" class="nav-btn transition-all hover:text-amber-500 text-gray-600 active-tab" title="冒險">
                <i class="fa-solid fa-compass text-2xl"></i>
            </button>
            <button onclick="changeTab('summary')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="概要">
                <i class="fa-solid fa-map-location-dot text-2xl"></i>
            </button>
            <button onclick="changeTab('status')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="狀態">
                <i class="fa-solid fa-id-card text-2xl"></i>
            </button>
            <button onclick="changeTab('party')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="隊伍">
                <i class="fa-solid fa-users-viewfinder text-2xl"></i>
            </button>
            <button onclick="changeTab('inventory')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="背包">
                <i class="fa-solid fa-box-open text-2xl"></i>
            </button>
        </aside>

        <main class="flex-grow flex flex-col bg-gray-900/50">
            <div id="content-area" class="flex-grow overflow-y-auto p-6 custom-scroll">
                
                <div id="tab-adventure" class="tab-pane h-full flex flex-col">
                    <div id="game-log" class="flex-grow space-y-4 pb-10">
                        </div>
                </div>

                <div id="tab-summary" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Chronicle & Intel</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="runic-border p-6 rounded bg-black/40">
                            <h3 class="font-bold text-white border-b border-gray-700 mb-4 pb-2">冒險概要</h3>
                            <p id="summary-narrative" class="text-gray-400">當前尚未有冒險紀錄...</p>
                        </div>
                        <div class="runic-border p-6 rounded bg-black/40">
                            <h3 class="font-bold text-white border-b border-gray-700 mb-4 pb-2">勢力圖譜</h3>
                            <div id="faction-list" class="space-y-2 text-sm text-gray-400">目前尚無勢力涉入</div>
                        </div>
                    </div>
                </div>

                <div id="tab-status" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Heroic Attributes</h2>
                    <div id="player-status-container"></div>
                </div>

                <div id="tab-party" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Fellowship</h2>
                    <div id="party-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="tab-inventory" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Treasury & Gear</h2>
                    <div id="inventory-container"></div>
                </div>

            </div>

            <section id="action-bar" class="bg-gray-800/80 border-t border-gray-700 p-6">
                <div id="choice-buttons" class="grid grid-cols-3 gap-4 mb-4">
                    </div>
                <div class="flex gap-3">
                    <input type="text" id="free-input" placeholder="或是輸入自訂意志..." class="flex-grow bg-black/50 border border-gray-600 rounded px-4 py-2 text-white focus:border-amber-500 outline-none" onkeypress="if(event.key === 'Enter') handleAction()">
                    <button id="submit-btn" onclick="handleAction()" class="btn-fantasy px-8 py-2 rounded font-bold text-amber-500">決斷</button>
                </div>
            </section>
        </main>

        <aside class="w-72 bg-black/80 border-l border-gray-800 p-6 flex flex-col">
            <div class="flex-grow space-y-6">
                <h3 class="cinzel text-amber-600 text-lg border-b border-amber-900/50 pb-2">Fate Tracker</h3>
                <div id="quick-combat" class="hidden">
                    <div class="text-xs text-red-500 mb-2 uppercase tracking-tighter">Combat Initiative</div>
                    <div id="combat-list" class="space-y-2"></div>
                </div>
                <div id="quick-stats" class="space-y-4 text-sm text-gray-300">
                    </div>
            </div>

            <div class="runic-border p-4 rounded bg-gray-900/80 mt-auto">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs cinzel opacity-50">Roll for Destiny</span>
                    <div id="dice-display" class="text-2xl font-black text-amber-500">--</div>
                </div>
                <div id="dice-visual-box" class="w-20 h-20 bg-gray-800 mx-auto rounded-xl flex items-center justify-center border-2 border-gray-600 shadow-lg mb-4 text-3xl font-bold">
                    ?
                </div>
                <div class="grid grid-cols-3 gap-2 text-white">
                    <button onclick="roll(4)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D4</button>
                    <button onclick="roll(6)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D6</button>
                    <button onclick="roll(8)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D8</button>
                    <button onclick="roll(10)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D10</button>
                    <button onclick="roll(12)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D12</button>
                    <button onclick="roll(20)" class="bg-amber-900/20 border border-amber-600 text-amber-500 py-1 rounded text-xs font-bold">D20</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // --- 核心資料與對話歷史 ---
        let chatHistory = []; 

        const Game = {
            players: [],
            party: [
                { name: "艾莉亞", title: "晨曦祭司", hp: 12, maxHp: 12, stats: { str: 8, dex: 12, con: 12, int: 10, wis: 16, cha: 14 }, skills: ["治療術", "神聖光輝"] }
            ],
            world: "被遺忘的國度",
            location: "無冬城",
            mission: "尋找真相",
            inventory: {
                personal: ["粗糙的冒險包", "睡袋", "火把 x5"],
                party: ["共用帳篷", "乾糧 x10"],
                gold: 50,
                questItems: []
            }
        };

        const setupState = {
            step: 1, 
            count: 1,
            currentPlayerIdx: 0
        };

        // --- UI 控制 ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function changeTab(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.querySelector(`[onclick="changeTab('${tab}')"]`).classList.add('active-tab');
            
            if(tab === 'status') renderStatus();
            if(tab === 'inventory') renderInventory();
            if(tab === 'party') renderParty();
        }

        function addLog(sender, text) {
            const log = document.getElementById('game-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${sender === 'GM' ? 'log-gm' : (sender === '系統' ? 'log-system' : 'log-player')}`;
            
            let prefix = sender === 'GM' ? '<i class="fa-solid fa-dragon text-amber-500 mr-2"></i>GM' : (sender === '系統' ? '<i class="fa-solid fa-gear mr-1"></i> 系統' : '玩家');
            entry.innerHTML = `<strong>${prefix}:</strong> <div class="mt-1">${text}</div>`;
            
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function setChoices(choices) {
            const btnArea = document.getElementById('choice-buttons');
            btnArea.innerHTML = '';
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn-fantasy py-2 px-4 rounded text-xs text-left truncate';
                b.innerText = c;
                b.onclick = () => handleAction(c);
                btnArea.appendChild(b);
            });
        }

        // --- 遊戲設定與開局 ---
        function initSetup() {
            showScreen('screen-setup');
            renderSetup();
        }

        function renderSetup() {
            const body = document.getElementById('setup-body');
            const footer = document.getElementById('setup-footer');
            body.innerHTML = '';
            footer.innerHTML = '';

            if (setupState.step === 1) {
                document.getElementById('setup-header').innerText = "Phase I: 旅者的人數";
                body.innerHTML = `
                    <p class="text-gray-400">冒險即將展開，請問有多少位英雄準備踏入此間？</p>
                    <div class="flex gap-4">
                        <button onclick="setPlayerCount(1)" class="btn-fantasy p-4 rounded w-full">獨行冒險 (1人)</button>
                        <button onclick="setPlayerCount(2)" class="btn-fantasy p-4 rounded w-full opacity-50">命運雙子 (開發中)</button>
                        <button onclick="setPlayerCount(3)" class="btn-fantasy p-4 rounded w-full opacity-50">傳奇小隊 (開發中)</button>
                    </div>
                `;
            } else if (setupState.step === 2) {
                document.getElementById('setup-header').innerText = "Phase II: 世界與法則";
                body.innerHTML = `
                    <p class="text-gray-400 mb-4">請選擇將要進入的世界觀：</p>
                    <div class="grid grid-cols-1 gap-4 text-white">
                        <button onclick="setWorld('被遺忘的國度 (費倫)')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">被遺忘的國度 (Forgotten Realms)</b><br>
                            <span class="text-sm text-gray-400">標準劍與魔法，眾神林立。</span>
                        </button>
                        <button onclick="setWorld('艾伯倫 (魔法龐克)')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">艾伯倫 (Eberron)</b><br>
                            <span class="text-sm text-gray-400">魔法科技並行，充滿陰謀與閃電列車。</span>
                        </button>
                        <button onclick="setWorld('自訂黑暗奇幻世界')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">渾沌之始 (未知領域)</b><br>
                            <span class="text-sm text-gray-400">由系統根據後續決策即時生成的殘酷世界。</span>
                        </button>
                    </div>
                `;
            } else if (setupState.step === 3) {
                document.getElementById('setup-header').innerText = "Phase III: 初始境地與宿命";
                body.innerHTML = `
                    <div class="grid grid-cols-2 gap-8 text-white">
                        <div class="space-y-4">
                            <h4 class="text-amber-500 font-bold">起始地點</h4>
                            <select id="start-loc" class="w-full bg-gray-900 p-3 border border-gray-600 rounded">
                                <option value="喧囂的港口城市">港口都市</option>
                                <option value="偏遠的礦業村落">邊境礦村</option>
                                <option value="幽暗地底的邊緣">地底邊緣</option>
                            </select>
                        </div>
                        <div class="space-y-4">
                            <h4 class="text-amber-500 font-bold">玩家使命</h4>
                            <select id="start-mission" class="w-full bg-gray-900 p-3 border border-gray-600 rounded">
                                <option value="尋找失蹤血親的孤兒">血親之仇 (身世悲慘)</option>
                                <option value="尋找遠古神器的學者">學者的執念 (知性追求)</option>
                                <option value="躲避追捕的王國逃兵">王國逃兵 (動盪求生)</option>
                            </select>
                        </div>
                    </div>
                `;
                footer.innerHTML = `<button onclick="nextStep()" class="btn-fantasy px-10 py-3 rounded font-bold text-amber-500">銘刻命運</button>`;
            } else if (setupState.step === 4) {
                document.getElementById('setup-header').innerText = `Phase IV: 創造英雄`;
                body.innerHTML = `
                    <div class="space-y-6 text-white">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">英雄姓名</label>
                                <input type="text" id="char-name" placeholder="輸入名諱..." class="w-full bg-gray-900 p-3 border border-gray-600 rounded">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">職業選擇</label>
                                <select id="char-class" class="w-full bg-gray-900 p-3 border border-gray-600 rounded">
                                    <option value="戰士">戰士 (Fighter)</option>
                                    <option value="法師">法師 (Wizard)</option>
                                    <option value="遊蕩者">遊蕩者 (Rogue)</option>
                                    <option value="牧師">牧師 (Cleric)</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">屬性陣列 (標準配置)</label>
                            <div class="grid grid-cols-6 gap-2 text-center text-sm">
                                <div class="bg-gray-800 p-3 rounded border border-gray-700">STR <br><b class="text-lg text-amber-500">15</b></div>
                                <div class="bg-gray-800 p-3 rounded border border-gray-700">DEX <br><b class="text-lg text-amber-500">14</b></div>
                                <div class="bg-gray-800 p-3 rounded border border-gray-700">CON <br><b class="text-lg text-amber-500">13</b></div>
                                <div class="bg-gray-800 p-3 rounded border border-gray-700">INT <br><b class="text-lg text-amber-500">12</b></div>
                                <div class="bg-gray-800 p-3 rounded border border-gray-700">WIS <br><b class="text-lg text-amber-500">10</b></div>
                                <div class="bg-gray-800 p-3 rounded border border-gray-700">CHA <br><b class="text-lg text-amber-500">8</b></div>
                            </div>
                        </div>
                    </div>
                `;
                footer.innerHTML = `<button onclick="createPlayer()" class="btn-fantasy px-10 py-3 rounded font-bold text-amber-500">踏入深淵</button>`;
            }
        }

        function setPlayerCount(n) { setupState.count = n; setupState.step = 2; renderSetup(); }
        function setWorld(w) { Game.world = w; setupState.step = 3; renderSetup(); }
        function nextStep() {
            Game.location = document.getElementById('start-loc').value;
            Game.mission = document.getElementById('start-mission').value;
            setupState.step = 4;
            renderSetup();
        }
        function createPlayer() {
            const name = document.getElementById('char-name').value || "無名者";
            const cls = document.getElementById('char-class').value;
            Game.players.push({
                name: name, class: cls, level: 1, title: "默默無名的冒險者",
                hp: 12, maxHp: 12,
                stats: { str: 15, dex: 14, con: 13, int: 12, wis: 10, cha: 8 },
                skills: ["基礎防禦", "武器熟練"]
            });
            startGame();
        }

        // --- 與 API 串接的核心邏輯 ---
        function startGame() {
            showScreen('screen-game');
            updateQuickStats();
            
            const p = Game.players[0];
            addLog('系統', `規則庫載入完畢。世界觀設定為《${Game.world}》。準備喚醒 AI 導師...`);
            document.getElementById('summary-narrative').innerText = `${p.name} (${p.class}) 抵達了 ${Game.location}。`;

            // 組裝交給 Gemini 的初始設定 Prompt
            const initPrompt = `請扮演龍與地下城(D&D 5E)的嚴謹GM。
            【戰役設定】世界觀：${Game.world}。起始地點：${Game.location}。玩家背景/使命：${Game.mission}。
            【玩家角色】姓名：${p.name}。職業：${p.class}。等級：1。
            【任務要求】請根據以上設定，為這名玩家描述一個充滿沉浸感的開場場景，描繪周遭的環境與NPC。在結尾，請給出3個供玩家選擇的行動方向建議。`;

            callGameAPI(initPrompt, true);
        }

        async function handleAction(actionText) {
            const input = document.getElementById('free-input');
            const prompt = actionText || input.value;
            if(!prompt) return;
            
            addLog('玩家', prompt);
            if(input) input.value = '';

            const btnArea = document.getElementById('choice-buttons');
            btnArea.innerHTML = '<span class="text-gray-500 italic text-sm py-2">命運的齒輪正在轉動...</span>';
            document.getElementById('submit-btn').classList.add('opacity-50', 'cursor-not-allowed');

            // 標準對話發送
            const systemPrompt = `你是一名D&D 5E的GM。玩家剛才的行動是：「${prompt}」。請判斷結果並描述場景，必要時請要求玩家擲骰。結尾請給出3個建議行動選項。`;
            callGameAPI(systemPrompt, false);
        }

        async function callGameAPI(prompt, isInit = false) {
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: prompt, 
                        history: chatHistory 
                    })
                });

                if (!response.ok) throw new Error(`HTTP 錯誤: ${response.status}`);

                const data = await response.json();
                const gmReply = data.reply.replace(/\n/g, '<br>');
                
                addLog('GM', gmReply);
                
                // 更新對話歷史給 API
                chatHistory.push({ role: "user", parts: [{ text: prompt }] });
                chatHistory.push({ role: "model", parts: [{ text: data.reply }] });

                // 產生預設按鈕 (可後續靠正則表達式從 Gemini 回覆中萃取，此處提供泛用選項)
                setChoices(["繼續探索前進", "仔細檢查周遭 (察覺)", "查看自身物品"]);
                
            } catch (error) {
                console.error("API 連線異常:", error);
                addLog('系統', `<span class="text-red-500">無法連接至神諭之眼 (API 連線失敗：${error.message})</span>`);
                setChoices(["重試連線", "查看狀態"]);
            } finally {
                document.getElementById('submit-btn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // --- 渲染分頁與側邊欄 ---
        function renderStatus() {
            const container = document.getElementById('player-status-container');
            container.innerHTML = Game.players.map(p => `
                <div class="runic-border p-6 rounded bg-black/40 mb-6">
                    <div class="flex justify-between items-end mb-4 border-b border-gray-800 pb-4">
                        <div>
                            <h3 class="text-3xl text-white font-bold">${p.name}</h3>
                            <p class="text-amber-500 italic">${p.title}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-sm text-gray-400">等級 ${p.level}</span>
                            <div class="text-white font-bold text-xl">${p.class}</div>
                        </div>
                    </div>
                    <div class="mb-6">
                        <div class="flex justify-between text-sm mb-1 text-gray-300"><span>生命值 (HP)</span><span>${p.hp} / ${p.maxHp}</span></div>
                        <div class="w-full bg-gray-900 h-2 rounded-full">
                            <div class="bg-red-600 h-full rounded-full" style="width: ${(p.hp/p.maxHp)*100}%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-6 gap-3 text-center text-white">
                        ${Object.entries(p.stats).map(([k, v]) => `
                            <div class="bg-gray-800 p-2 rounded border border-gray-700 shadow-inner">
                                <div class="text-[10px] uppercase text-gray-500 mb-1">${k}</div>
                                <div class="font-bold text-lg">${v}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderParty() {
            const container = document.getElementById('party-container');
            container.innerHTML = Game.party.map(p => `
                <div class="runic-border p-4 rounded bg-gray-800/40 flex gap-4 items-center">
                    <div class="w-14 h-14 bg-gray-900 border border-gray-700 rounded-full flex items-center justify-center text-xl text-gray-500"><i class="fa-solid fa-user-cloak"></i></div>
                    <div class="flex-grow">
                        <div class="font-bold text-white text-lg">${p.name} <span class="text-xs font-normal text-gray-500">Lv.1</span></div>
                        <div class="text-xs text-amber-600 mb-2">${p.title}</div>
                        <div class="flex justify-between text-[10px] text-gray-400"><span>HP</span> <span>${p.hp}/${p.maxHp}</span></div>
                        <div class="w-full bg-gray-900 h-1 mt-1 rounded-full"><div class="bg-blue-500 h-full rounded-full" style="width: ${(p.hp/p.maxHp)*100}%"></div></div>
                    </div>
                </div>
            `).join('');
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="runic-border p-6 rounded bg-black/40 text-gray-300">
                        <div class="flex justify-between border-b border-gray-700 pb-2 mb-4">
                            <h3 class="text-white font-bold"><i class="fa-solid fa-sack-xmark mr-2"></i>個人武裝</h3>
                            <span class="text-yellow-500 font-bold bg-gray-900 px-2 rounded"><i class="fa-solid fa-coins text-xs mr-1"></i>${Game.inventory.gold}</span>
                        </div>
                        <ul class="text-sm space-y-3">
                            ${Game.inventory.personal.map(i => `<li class="flex justify-between bg-gray-800/50 p-2 rounded"><span>${i}</span><span class="text-gray-500">x1</span></li>`).join('')}
                        </ul>
                    </div>
                    <div class="runic-border p-6 rounded bg-black/40 text-gray-300">
                        <h3 class="text-white font-bold border-b border-gray-700 pb-2 mb-4"><i class="fa-solid fa-box-archive mr-2"></i>隊伍共同物資</h3>
                        <ul class="text-sm space-y-3">
                            ${Game.inventory.party.map(i => `<li class="flex justify-between bg-gray-800/50 p-2 rounded"><span>${i}</span><span class="text-gray-500">x1</span></li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        function updateQuickStats() {
            if(Game.players.length === 0) return;
            const p = Game.players[0];
            const q = document.getElementById('quick-stats');
            q.innerHTML = `
                <div class="flex justify-between text-xs mb-1 text-gray-400"><span>HP</span> <span>${p.hp} / ${p.maxHp}</span></div>
                <div class="w-full bg-gray-900 h-1.5 mb-4 rounded-full"><div class="bg-red-600 h-full rounded-full" style="width: ${(p.hp/p.maxHp)*100}%"></div></div>
                <div class="flex justify-between border-b border-gray-800 pb-2 mb-2"><span>護甲 (AC)</span> <span class="text-white font-bold">14</span></div>
                <div class="flex justify-between border-b border-gray-800 pb-2"><span>速度 (Speed)</span> <span class="text-white font-bold">30 ft</span></div>
            `;
        }

        // --- 命運之骰 ---
        function roll(sides) {
            const box = document.getElementById('dice-visual-box');
            const display = document.getElementById('dice-display');
            
            // 觸發動畫
            box.classList.remove('dice-rolling');
            void box.offsetWidth; // 觸發重繪以重置動畫
            box.classList.add('dice-rolling');
            box.innerText = "?";
            
            setTimeout(() => {
                const res = Math.floor(Math.random() * sides) + 1;
                box.innerText = res;
                display.innerText = res;
                
                let resultText = `系統代替玩家擲骰 <strong>D${sides}</strong>，結果為：<strong class="text-lg text-white">${res}</strong>`;
                
                // 暴擊與大失敗特效
                if(sides === 20 && res === 20) {
                    box.style.color = "var(--accent-amber)";
                    box.style.borderColor = "var(--accent-amber)";
                    box.style.textShadow = "0 0 10px rgba(212,175,55,0.8)";
                    resultText += ` <span class="text-amber-500 ml-2">★ 大成功 (Critical Success)! ★</span> ` ;
                } else if(sides === 20 && res === 1) {
                    box.style.color = "#ef4444";
                    box.style.borderColor = "#ef4444";
                    box.style.textShadow = "0 0 10px rgba(239,68,68,0.8)";
                    resultText += ` <span class="text-red-500 ml-2">☠ 大失敗 (Critical Miss)! ☠</span> ` ;
                } else {
                    box.style.color = "white";
                    box.style.borderColor = "var(--border-runic)";
                    box.style.textShadow = "none";
                }
                
                addLog('系統', resultText);
                
                // 將擲骰結果預填至輸入框，方便玩家直接發送給 GM
                const input = document.getElementById('free-input');
                input.value = `(擲骰 D${sides} 結果為 ${res}) `;
                input.focus();
                
            }, 600);
        }

    </script>
</body>
</html>
