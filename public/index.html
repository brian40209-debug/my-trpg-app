<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深淵與龍：極致 GM 輔助系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #0f1115;
            --panel-grey: #1c1e22;
            --border-runic: #3f444b;
            --accent-amber: #d4af37;
            --text-silver: #b0b4b8;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-deep);
            color: var(--text-silver);
            overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* 羊皮紙質感灰色漸變 */
        .parchment-grey {
            background: linear-gradient(135deg, #2c2f35 0%, #1c1e22 100%);
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .runic-border {
            border: 2px solid var(--border-runic);
            position: relative;
        }

        .runic-border::before {
            content: "ᚱᚢᚾᛖinitial";
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-deep);
            padding: 0 10px;
            color: var(--accent-amber);
            font-size: 12px;
            letter-spacing: 5px;
            opacity: 0.6;
        }

        /* 捲軸美化 */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #111; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border-runic); border-radius: 3px; }

        .btn-fantasy {
            background: linear-gradient(to bottom, #3a3f47, #24282e);
            border: 1px solid var(--border-runic);
            transition: all 0.3s;
            overflow: hidden;
        }

        .btn-fantasy:hover {
            border-color: var(--accent-amber);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            color: white;
        }

        .active-tab {
            color: var(--accent-amber) !important;
            border-left: 4px solid var(--accent-amber);
            background: rgba(212, 175, 55, 0.05);
        }

        .log-gm { border-left: 3px solid var(--accent-amber); padding-left: 1rem; margin-bottom: 1.5rem; }
        .log-player { text-align: right; color: #88929b; font-style: italic; margin-bottom: 1rem; }
        .log-system { background: rgba(255,255,255,0.03); text-align: center; font-size: 0.85rem; padding: 0.5rem; border-radius: 4px; margin: 1rem 0; }

        .screen { display: none; }
        .screen.active { display: flex; }

        /* 骰子動畫 */
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(90deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .dice-rolling { animation: roll 0.6s ease-out; }
    </style>
</head>
<body class="h-screen w-screen">

    <!-- 畫面 1: 主選單 -->
    <div id="screen-main" class="screen active flex-col items-center justify-center h-full w-full">
        <div class="text-center mb-12">
            <h1 class="text-7xl font-black cinzel tracking-widest text-white mb-2">DUNGEONS</h1>
            <h1 class="text-5xl font-light cinzel tracking-widest text-amber-600 mb-6">& ABYSS</h1>
            <p class="text-gray-500 tracking-widest uppercase text-sm">Automated GM Oracle System</p>
            <div class="h-px w-64 bg-gradient-to-r from-transparent via-amber-700 to-transparent mx-auto mt-4"></div>
        </div>
        <div class="flex flex-col gap-4 w-72">
            <button onclick="initSetup()" class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 開始冒險
            </button>
            <button class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3 opacity-40 cursor-not-allowed">
                <i class="fa-solid fa-clock-rotate-left"></i> 繼續遊戲
            </button>
            <button onclick="window.close()" class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3">
                <i class="fa-solid fa-skull"></i> 離開世界
            </button>
        </div>
    </div>

    <!-- 畫面 2: 初始化設定 (人數/世界觀/創角) -->
    <div id="screen-setup" class="screen flex-col items-center justify-center h-full w-full p-10">
        <div class="parchment-grey runic-border w-full max-w-3xl rounded-lg p-10 flex flex-col h-[80vh]">
            <div id="setup-header" class="text-2xl text-amber-500 font-bold mb-6 border-b border-gray-700 pb-4 cinzel">
                Phase I: The Gathering
            </div>
            <div id="setup-body" class="flex-grow overflow-y-auto custom-scroll pr-4 space-y-6 text-lg">
                <!-- 動態注入內容 -->
            </div>
            <div id="setup-footer" class="mt-8 flex justify-end">
                <!-- 下一步按鈕 -->
            </div>
        </div>
    </div>

    <!-- 畫面 3: 遊戲主介面 -->
    <div id="screen-game" class="screen h-full w-full flex overflow-hidden">
        
        <!-- 左側導覽列 -->
        <aside class="w-20 bg-black border-r border-gray-800 flex flex-col items-center py-8 gap-8">
            <button onclick="changeTab('adventure')" class="nav-btn transition-all hover:text-amber-500 text-gray-600 active-tab" title="冒險">
                <i class="fa-solid fa-compass text-2xl"></i>
            </button>
            <button onclick="changeTab('summary')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="概要">
                <i class="fa-solid fa-map-location-dot text-2xl"></i>
            </button>
            <button onclick="changeTab('status')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="狀態">
                <i class="fa-solid fa-id-card text-2xl"></i>
            </button>
            <button onclick="changeTab('party')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="隊伍">
                <i class="fa-solid fa-users-viewfinder text-2xl"></i>
            </button>
            <button onclick="changeTab('inventory')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="背包">
                <i class="fa-solid fa-box-open text-2xl"></i>
            </button>
        </aside>

        <!-- 中央主顯示區 -->
        <main class="flex-grow flex flex-col bg-gray-900/50">
            <!-- 各分頁內容 -->
            <div id="content-area" class="flex-grow overflow-y-auto p-6 custom-scroll">
                
                <!-- 冒險模式 -->
                <div id="tab-adventure" class="tab-pane h-full flex flex-col">
                    <div id="game-log" class="flex-grow space-y-4">
                        <!-- 故事輸出 -->
                    </div>
                </div>

                <!-- 概要模式 -->
                <div id="tab-summary" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Chronicle & Intel</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="runic-border p-6 rounded bg-black/40">
                            <h3 class="font-bold text-white border-b border-gray-700 mb-4 pb-2">冒險概要</h3>
                            <p id="summary-narrative" class="text-gray-400">當前尚未有冒險紀錄...</p>
                        </div>
                        <div class="runic-border p-6 rounded bg-black/40">
                            <h3 class="font-bold text-white border-b border-gray-700 mb-4 pb-2">勢力圖譜</h3>
                            <div id="faction-list" class="space-y-2 text-sm"></div>
                        </div>
                    </div>
                </div>

                <!-- 狀態模式 -->
                <div id="tab-status" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Heroic Attributes</h2>
                    <div id="player-status-container"></div>
                </div>

                <!-- 隊伍模式 -->
                <div id="tab-party" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Fellowship</h2>
                    <div id="party-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <!-- 背包模式 -->
                <div id="tab-inventory" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Treasury & Gear</h2>
                    <div id="inventory-container"></div>
                </div>

            </div>

            <!-- 底部互動區 -->
            <section id="action-bar" class="bg-gray-800/80 border-t border-gray-700 p-6">
                <div id="choice-buttons" class="grid grid-cols-3 gap-4 mb-4">
                    <!-- 選項按鈕 -->
                </div>
                <div class="flex gap-3">
                    <input type="text" id="free-input" placeholder="或是輸入自訂意志..." class="flex-grow bg-black/50 border border-gray-600 rounded px-4 py-2 focus:border-amber-500 outline-none">
                    <button onclick="handleAction()" class="btn-fantasy px-8 py-2 rounded font-bold text-amber-500">決斷</button>
                </div>
            </section>
        </main>

        <!-- 右側面板 (骰子與即時狀態) -->
        <aside class="w-72 bg-black/80 border-l border-gray-800 p-6 flex flex-col">
            <div class="flex-grow space-y-6">
                <h3 class="cinzel text-amber-600 text-lg border-b border-amber-900/50 pb-2">Fate Tracker</h3>
                <div id="quick-combat" class="hidden">
                    <div class="text-xs text-red-500 mb-2 uppercase tracking-tighter">Combat Initiative</div>
                    <div id="combat-list" class="space-y-2"></div>
                </div>
                <div id="quick-stats" class="space-y-4 text-sm">
                    <!-- 快速顯示 HP 等 -->
                </div>
            </div>

            <!-- 骰子面板 -->
            <div class="runic-border p-4 rounded bg-gray-900/80 mt-auto">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs cinzel opacity-50">Roll for Destiny</span>
                    <div id="dice-display" class="text-2xl font-black text-amber-500">--</div>
                </div>
                <div id="dice-visual-box" class="w-20 h-20 bg-gray-800 mx-auto rounded-xl flex items-center justify-center border-2 border-gray-600 shadow-lg mb-4 text-3xl font-bold">
                    ?
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="roll(4)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs">D4</button>
                    <button onclick="roll(6)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs">D6</button>
                    <button onclick="roll(8)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs">D8</button>
                    <button onclick="roll(10)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs">D10</button>
                    <button onclick="roll(12)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs">D12</button>
                    <button onclick="roll(20)" class="bg-amber-900/20 border border-amber-600 text-amber-500 py-1 rounded text-xs font-bold">D20</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
	// 清理後的整合腳本建議
// 1. 移除掉先前的 submitAction 與後端串接邏輯
// 2. 專注於目前的 Game 物件互動

// 骰子與行動判定邏輯 (保持目前的高品質狀態)
async function handleAction(actionText) {
    const input = document.getElementById('free-input');
    const prompt = actionText || input.value;
    if(!prompt) return;
    
    // 1. 顯示玩家動作
    addLog('玩家', prompt);
    if(input) input.value = '';

    // 2. 顯示思考中的狀態 (優化體驗)
    addLog('系統', "AI 正在運算命運...");

    // 3. 連結後端 API
    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                prompt: prompt, 
                history: chatHistory 
            })
        });

        const data = await response.json();
        
        // 移除「思考中」的系統訊息 (可選，若有實作移除 DOM 的功能)
        if (data.reply) {
            addLog('GM', data.reply);
            // 更新歷史 (Gemini 需要陣列格式)
            chatHistory.push({ role: "user", parts: [{ text: prompt }] });
            chatHistory.push({ role: "model", parts: [{ text: data.reply }] });
        }
    } catch (error) {
        addLog('系統', "無法連接至 AI，請檢查網路或 API 設定。");
	console.error(error);
    }
}
// 輔助函式：將內容加入畫面
function appendLog(type, text) {
    const log = document.getElementById('story-log');
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight; // 自動捲動到底部
}
        // --- 核心資料與狀態 ---
        const Game = {
            players: [],
            party: [
                { name: "艾莉亞", title: "晨曦祭司", hp: 12, maxHp: 12, stats: { str: 8, dex: 12, con: 12, int: 10, wis: 16, cha: 14 }, skills: ["治療術", "神聖光輝"] }
            ],
            world: "",
            location: "",
            mission: "",
            currentTurn: 0,
            isCombat: false,
            inventory: {
                personal: ["粗糙的冒險包", "睡袋"],
                party: ["共用帳篷", "乾糧 x10"],
                gold: 50,
                questItems: []
            },
            history: "你們的故事才剛開始...",
            factions: "目前尚無勢力涉入"
        };

        const setupState = {
            step: 1, // 1: 人數, 2: 世界, 3: 地點/使命, 4: 角色創造
            count: 1,
            currentPlayerIdx: 0
        };

        // --- UI 控制 ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function changeTab(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.querySelector(`[onclick="changeTab('${tab}')"]`).classList.add('active-tab');
            if(tab === 'status') renderStatus();
            if(tab === 'inventory') renderInventory();
            if(tab === 'party') renderParty();
        }

        // --- 遊戲邏輯 ---
        function initSetup() {
            showScreen('screen-setup');
            renderSetup();
        }

        function renderSetup() {
            const body = document.getElementById('setup-body');
            const footer = document.getElementById('setup-footer');
            body.innerHTML = '';
            footer.innerHTML = '';

            if (setupState.step === 1) {
                document.getElementById('setup-header').innerText = "Phase I: 旅者的人數";
                body.innerHTML = `
                    <p class="text-gray-400">冒險即將展開，請問有多少位英雄準備踏入此間？</p>
                    <div class="flex gap-4">
                        <button onclick="setPlayerCount(1)" class="btn-fantasy p-4 rounded w-full">獨行冒險 (1人)</button>
                        <button onclick="setPlayerCount(2)" class="btn-fantasy p-4 rounded w-full">命運雙子 (2人)</button>
                        <button onclick="setPlayerCount(3)" class="btn-fantasy p-4 rounded w-full">傳奇小隊 (3人)</button>
                    </div>
                `;
            } else if (setupState.step === 2) {
                document.getElementById('setup-header').innerText = "Phase II: 世界與法則 (玩家A 決策)";
                body.innerHTML = `
                    <p class="text-gray-400 mb-4">請參照 5eTools 資料庫設定，或自訂宏觀世界觀：</p>
                    <div class="grid grid-cols-1 gap-4">
                        <button onclick="setWorld('費倫 - 被遺忘的國度')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">被遺忘的國度 (Forgotten Realms)</b><br>
                            <span class="text-sm">標準劍與魔法，眾神林立。</span>
                        </button>
                        <button onclick="setWorld('艾伯倫 - 魔法工業')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">艾伯倫 (Eberron)</b><br>
                            <span class="text-sm">魔法科技並行，充滿黑色電影氣息與魔法鐵路。</span>
                        </button>
                        <button onclick="setWorld('自訂世界觀')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">渾沌之始 (自訂世界)</b><br>
                            <span class="text-sm">由系統即時根據後續決策生成的未知領域。</span>
                        </button>
                    </div>
                `;
            } else if (setupState.step === 3) {
                document.getElementById('setup-header').innerText = "Phase III: 初始境地與宿命";
                body.innerHTML = `
                    <div class="grid grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <h4 class="text-white">起始地點</h4>
                            <select id="start-loc" class="w-full bg-black p-2 border border-gray-600 rounded">
                                <option value="無冬城港口 (碼頭區)">無冬城港口 (都市地形)</option>
                                <option value="法達林礦村 (邊境山脈)">法達林礦村 (山地地形)</option>
                                <option value="地底城邊緣 (幽暗地穴)">地底城邊緣 (洞窟地形)</option>
                            </select>
                        </div>
                        <div class="space-y-4">
                            <h4 class="text-white">玩家使命</h4>
                            <select id="start-mission" class="w-full bg-black p-2 border border-gray-600 rounded">
                                <option value="血親之仇 (被滅門的倖存者)">血親之仇 (身世悲慘)</option>
                                <option value="學者的執念 (尋找遠古神器)">學者的執念 (身世知性)</option>
                                <option value="王國逃兵 (躲避追捕的人)">王國逃兵 (身世動盪)</option>
                            </select>
                        </div>
                    </div>
                `;
                footer.innerHTML = `<button onclick="nextStep()" class="btn-fantasy px-10 py-2 rounded text-amber-500">下一步</button>`;
            } else if (setupState.step === 4) {
                const pName = String.fromCharCode(65 + setupState.currentPlayerIdx);
                document.getElementById('setup-header').innerText = `Phase IV: 創造英雄 - 玩家 ${pName}`;
                body.innerHTML = `
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="char-name" placeholder="英雄姓名" class="bg-black p-2 border border-gray-600 rounded">
                            <select id="char-class" class="bg-black p-2 border border-gray-600 rounded">
                                <option value="戰士">戰士 (Fighter)</option>
                                <option value="法師">法師 (Wizard)</option>
                                <option value="遊蕩者">遊蕩者 (Rogue)</option>
                                <option value="牧師">牧師 (Cleric)</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center text-xs">
                            <div class="bg-gray-800 p-2 rounded">STR <b>15</b></div>
                            <div class="bg-gray-800 p-2 rounded">DEX <b>14</b></div>
                            <div class="bg-gray-800 p-2 rounded">CON <b>13</b></div>
                            <div class="bg-gray-800 p-2 rounded">INT <b>12</b></div>
                            <div class="bg-gray-800 p-2 rounded">WIS <b>10</b></div>
                            <div class="bg-gray-800 p-2 rounded">CHA <b>8</b></div>
                        </div>
                        <p class="text-xs text-gray-500 italic">*系統根據 5E 標準陣列 (15,14,13,12,10,8) 自動配置。*</p>
                    </div>
                `;
                footer.innerHTML = `<button onclick="createPlayer()" class="btn-fantasy px-10 py-2 rounded text-amber-500">
                    ${setupState.currentPlayerIdx < setupState.count - 1 ? '下一位玩家' : '開始冒險'}
                </button>`;
            }
        }

        // --- 處理初始化設定邏輯 ---
        function setPlayerCount(n) { setupState.count = n; setupState.step = 2; renderSetup(); }
        function setWorld(w) { Game.world = w; setupState.step = 3; renderSetup(); }
        function nextStep() {
            Game.location = document.getElementById('start-loc').value;
            Game.mission = document.getElementById('start-mission').value;
            setupState.step = 4;
            renderSetup();
        }
        function createPlayer() {
            const name = document.getElementById('char-name').value || "無名者";
            const cls = document.getElementById('char-class').value;
            Game.players.push({
                name: name,
                class: cls,
                level: 1,
                title: "默默無名的冒險者",
                hp: 10, maxHp: 10,
                stats: { str: 15, dex: 14, con: 13, int: 12, wis: 10, cha: 8 },
                skills: ["基礎戰術", "生存技能"]
            });

            if (setupState.currentPlayerIdx < setupState.count - 1) {
                setupState.currentPlayerIdx++;
                renderSetup();
            } else {
                startGame();
            }
        }

        // --- 進入遊戲流程 ---
        function startGame() {
            showScreen('screen-game');
            addLog('系統', `歡迎進入《${Game.world}》。資料庫連結成功。`);
            addLog('GM', `你們一行人出現在 **${Game.location}**。天空灰濛濛的，空氣中帶著一股潮濕的土腥味。<br><br>
                身為 **${Game.mission}**，你們知道自己的使命才剛開始。這是一個弱肉強食的世界，每個決定都將刻在命運之書上。<br><br>
                在你們前方，一名穿著破舊披風的老人正顫抖地指著遠處的廢墟：「他們...他們帶走了我的孫女...」`);
            
            updateQuickStats();
            setChoices(["詢問老人關於廢墟的細節", "直接拔劍衝向廢墟 (戰鬥準備)", "檢查四周是否有足跡 (察覺判定)"]);
        }

        function addLog(sender, text) {
            const log = document.getElementById('game-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${sender === 'GM' ? 'log-gm' : (sender === '系統' ? 'log-system' : 'log-player')}`;
            entry.innerHTML = `<strong>${sender}:</strong> <div>${text}</div>`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
            Game.history = text.substring(0, 100) + "..."; // 簡化歷史記錄
        }

        function setChoices(choices) {
            const btnArea = document.getElementById('choice-buttons');
            btnArea.innerHTML = '';
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn-fantasy py-2 px-4 rounded text-xs text-left';
                b.innerText = c;
                b.onclick = () => handleAction(c);
                btnArea.appendChild(b);
            });
        }

        function handleAction(actionText) {
            const input = document.getElementById('free-input');
            const action = actionText || input.value;
            if(!action) return;
            
            addLog('玩家', action);
            input.value = '';

            // 模擬 GM 反應與擲骰判定
            setTimeout(() => {
                if(action.includes('判定')) {
                    addLog('系統', "需要進行一次判定，請投擲 D20 骰子。");
                    roll(20);
                } else {
                    addLog('GM', "你採取了行動。場景開始發生變化...(此處應連結 LLM 生成後續)");
                    setChoices(["繼續前進", "回頭尋找物資", "紮營休息"]);
                }
            }, 1000);
        }

        // --- 渲染分頁內容 ---
        function renderStatus() {
            const container = document.getElementById('player-status-container');
            container.innerHTML = Game.players.map(p => `
                <div class="runic-border p-6 rounded bg-black/40 mb-6">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <h3 class="text-2xl text-white font-bold">${p.name}</h3>
                            <p class="text-amber-500 italic text-sm">${p.title}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs">等級 ${p.level}</span>
                            <div class="text-white font-bold">${p.class}</div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="flex justify-between text-xs mb-1"><span>HP ${p.hp}/${p.maxHp}</span></div>
                        <div class="w-full bg-gray-900 h-1.5 rounded-full">
                            <div class="bg-red-600 h-full rounded-full" style="width: ${(p.hp/p.maxHp)*100}%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-6 gap-2 text-center">
                        ${Object.entries(p.stats).map(([k, v]) => `
                            <div class="bg-gray-800 p-1 rounded">
                                <div class="text-[10px] uppercase opacity-50">${k}</div>
                                <div class="font-bold">${v}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 flex flex-wrap gap-2">
                        ${p.skills.map(s => `<span class="text-[10px] bg-amber-900/30 text-amber-500 px-2 py-0.5 border border-amber-800 rounded">${s}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderParty() {
            const container = document.getElementById('party-container');
            container.innerHTML = Game.party.map(p => `
                <div class="runic-border p-4 rounded bg-blue-900/10 flex gap-4 items-center">
                    <div class="w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center"><i class="fa-solid fa-user-ninja"></i></div>
                    <div class="flex-grow">
                        <div class="font-bold text-white text-sm">${p.name} <span class="text-[10px] font-normal text-gray-400">Lv.1</span></div>
                        <div class="text-[10px] text-amber-600">${p.title}</div>
                        <div class="w-full bg-gray-900 h-1 mt-2"><div class="bg-blue-500 h-full" style="width: 100%"></div></div>
                    </div>
                </div>
            `).join('');
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="runic-border p-6 rounded bg-black/40">
                        <div class="flex justify-between border-b border-gray-700 pb-2 mb-4">
                            <h3 class="text-white font-bold">個人與金錢</h3>
                            <span class="text-amber-500"><i class="fa-solid fa-coins"></i> ${Game.inventory.gold} GP</span>
                        </div>
                        <ul class="text-sm space-y-2">
                            ${Game.inventory.personal.map(i => `<li class="flex justify-between opacity-70"><span>${i}</span><span>x1</span></li>`).join('')}
                        </ul>
                    </div>
                    <div class="runic-border p-6 rounded bg-black/40">
                        <h3 class="text-white font-bold border-b border-gray-700 pb-2 mb-4">隊伍物資與任務</h3>
                        <ul class="text-sm space-y-2">
                            ${Game.inventory.party.map(i => `<li class="flex justify-between opacity-70"><span>${i}</span><span>x1</span></li>`).join('')}
                            <li class="text-xs text-gray-600 italic">目前無任務道具</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function updateQuickStats() {
            const p = Game.players[0];
            const q = document.getElementById('quick-stats');
            q.innerHTML = `
                <div class="flex justify-between mb-1"><span>HP</span> <span>${p.hp}/${p.maxHp}</span></div>
                <div class="w-full bg-gray-900 h-1 mb-4"><div class="bg-red-600 h-full" style="width: 100%"></div></div>
                <div class="flex justify-between"><span>AC</span> <span>15</span></div>
                <div class="flex justify-between"><span>Speed</span> <span>30ft</span></div>
            `;
        }

        // --- 骰子 ---
        function roll(sides) {
            const box = document.getElementById('dice-visual-box');
            const display = document.getElementById('dice-display');
            box.classList.add('dice-rolling');
            box.innerText = "...";
            
            setTimeout(() => {
                box.classList.remove('dice-rolling');
                const res = Math.floor(Math.random() * sides) + 1;
                box.innerText = res;
                display.innerText = res;
                
                if(sides === 20 && res === 20) {
                    box.style.color = "var(--accent-amber)";
                    box.style.borderColor = "var(--accent-amber)";
                    addLog('系統', "★ **大成功 (Critical Success)!** ★");
                } else if(sides === 20 && res === 1) {
                    box.style.color = "#ef4444";
                    addLog('系統', "☠ **大失敗 (Critical Fail)!** ☠");
                } else {
                    box.style.color = "white";
                    box.style.borderColor = "var(--border-runic)";
                }
            }, 600);
        }

    </script>
</body>
</html>
