// 在 <script> 標籤內，將原本的 fakeGMNarrative 替換為以下邏輯

/**
 * 串接您的 API 處理遊戲邏輯
 * @param {string} userAction 玩家的輸入動作
 */
async function callGameAPI(userAction) {
    const API_URL = "YOUR_API_ENDPOINT"; // 請填入您的 API 位址
    const API_KEY = "YOUR_API_KEY";     // 請填入您的 API 金鑰

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                playerAction: userAction,
                gameState: state, // 傳送當前遊戲進度供 API 判斷
                timestamp: new Date().toISOString()
            })
        });

        if (!response.ok) throw new Error('API 連線異常');

        const data = await response.json();
        
        // 解析 API 回傳資料並更新 UI
        // 假設 API 回傳格式為 { narrative: "", suggestions: [], statusUpdate: {} }
        addLog('GM', data.narrative);
        setSuggestedActions(data.suggestions);
        
        if (data.statusUpdate) {
            updateStatsFromAPI(data.statusUpdate);
        }

    } catch (error) {
        addLog('系統', `<span class="text-red-500">API 連線失敗：${error.message}，請檢查後端服務。</span>`);
        console.error(error);
    }
}

// 覆寫原本的 submitAction 以呼叫 API
function submitAction(actionText = null) {
    const inputEl = document.getElementById('player-input');
    const text = actionText || inputEl.value.trim();
    if(!text) return;

    addLog('Player', text);
    inputEl.value = '';
    document.getElementById('suggested-actions').innerHTML = '<span class="text-gray-500 italic text-sm">GM 正在計算命運...</span>';
    
    // 呼叫您的 API
    callGameAPI(text);
}

// 輔助函式：更新角色狀態
function updateStatsFromAPI(status) {
    state.playerA.stats = { ...state.playerA.stats, ...status.stats };
    updateUIStats();
}
