<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深淵與龍：極致 GM 輔助系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #0f1115;
            --panel-grey: #1c1e22;
            --border-runic: #3f444b;
            --accent-amber: #d4af37;
            --text-silver: #b0b4b8;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-deep);
            color: var(--text-silver);
            overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .cinzel { font-family: 'Cinzel', serif; }

        .parchment-grey {
            background: linear-gradient(135deg, #2c2f35 0%, #1c1e22 100%);
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .runic-border {
            border: 2px solid var(--border-runic);
            position: relative;
        }

        .runic-border::before {
            content: "ᚱᚢᚾᛖ";
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-deep);
            padding: 0 10px;
            color: var(--accent-amber);
            font-size: 12px;
            letter-spacing: 5px;
            opacity: 0.6;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #111; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border-runic); border-radius: 3px; }

        .btn-fantasy {
            background: linear-gradient(to bottom, #3a3f47, #24282e);
            border: 1px solid var(--border-runic);
            transition: all 0.3s;
            overflow: hidden;
        }

        .btn-fantasy:hover {
            border-color: var(--accent-amber);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            color: white;
        }

        .active-tab {
            color: var(--accent-amber) !important;
            border-left: 4px solid var(--accent-amber);
            background: rgba(212, 175, 55, 0.05);
        }

        .log-gm { border-left: 3px solid var(--accent-amber); padding-left: 1rem; margin-bottom: 1.5rem; color: #d1d5db; line-height: 1.7; }
        .log-player { text-align: right; color: #88929b; font-style: italic; margin-bottom: 1rem; }
        .log-system { background: rgba(255,255,255,0.03); text-align: center; font-size: 0.85rem; padding: 0.5rem; border-radius: 4px; margin: 1rem 0; color: var(--accent-amber); }

        .screen { display: none; }
        .screen.active { display: flex; }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            20 { transform: rotate(90deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .dice-rolling { animation: roll 0.6s ease-out; }
    </style>
</head>
<body class="h-screen w-screen">

    <div id="screen-main" class="screen active flex-col items-center justify-center h-full w-full">
        <div class="text-center mb-12">
            <h1 class="text-7xl font-black cinzel tracking-widest text-white mb-2">DUNGEONS</h1>
            <h1 class="text-5xl font-light cinzel tracking-widest text-amber-600 mb-6">& ABYSS</h1>
            <p class="text-gray-500 tracking-widest uppercase text-sm">Automated GM Oracle System</p>
            <div class="h-px w-64 bg-gradient-to-r from-transparent via-amber-700 to-transparent mx-auto mt-4"></div>
        </div>
        <div class="flex flex-col gap-4 w-72">
            <button onclick="initSetup()" class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3 text-white">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 開始冒險
            </button>
            <button class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3 opacity-40 cursor-not-allowed text-gray-500">
                <i class="fa-solid fa-clock-rotate-left"></i> 繼續遊戲
            </button>
            <button onclick="window.close()" class="btn-fantasy py-4 px-6 rounded text-lg font-bold flex items-center justify-center gap-3 text-white">
                <i class="fa-solid fa-skull"></i> 離開世界
            </button>
        </div>
    </div>

    <div id="screen-setup" class="screen flex-col items-center justify-center h-full w-full p-10">
        <div class="parchment-grey runic-border w-full max-w-4xl rounded-lg p-10 flex flex-col h-[85vh]">
            <div id="setup-header" class="text-2xl text-amber-500 font-bold mb-6 border-b border-gray-700 pb-4 cinzel">
                Phase I: The Gathering
            </div>
            <div id="setup-body" class="flex-grow overflow-y-auto custom-scroll pr-4 space-y-6 text-base">
                </div>
            <div id="setup-footer" class="mt-8 flex justify-between border-t border-gray-800 pt-4">
                </div>
        </div>
    </div>

    <div id="screen-game" class="screen h-full w-full flex overflow-hidden">
        
        <aside class="w-20 bg-black border-r border-gray-800 flex flex-col items-center py-8 gap-8">
            <button onclick="changeTab('adventure')" class="nav-btn transition-all hover:text-amber-500 text-gray-600 active-tab" title="冒險">
                <i class="fa-solid fa-compass text-2xl"></i>
            </button>
            <button onclick="changeTab('summary')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="概要">
                <i class="fa-solid fa-map-location-dot text-2xl"></i>
            </button>
            <button onclick="changeTab('status')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="狀態">
                <i class="fa-solid fa-id-card text-2xl"></i>
            </button>
            <button onclick="changeTab('party')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="隊伍">
                <i class="fa-solid fa-users-viewfinder text-2xl"></i>
            </button>
            <button onclick="changeTab('inventory')" class="nav-btn transition-all hover:text-amber-500 text-gray-600" title="背包">
                <i class="fa-solid fa-box-open text-2xl"></i>
            </button>
        </aside>

        <main class="flex-grow flex flex-col bg-gray-900/50">
            <div id="content-area" class="flex-grow overflow-y-auto p-6 custom-scroll">
                <div id="tab-adventure" class="tab-pane h-full flex flex-col">
                    <div id="game-log" class="flex-grow space-y-4 pb-10"></div>
                </div>

                <div id="tab-summary" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Chronicle & Intel</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="runic-border p-6 rounded bg-black/40">
                            <h3 class="font-bold text-white border-b border-gray-700 mb-4 pb-2">冒險概要</h3>
                            <p id="summary-narrative" class="text-gray-400">當前尚未有冒險紀錄...</p>
                        </div>
                        <div class="runic-border p-6 rounded bg-black/40">
                            <h3 class="font-bold text-white border-b border-gray-700 mb-4 pb-2">勢力圖譜</h3>
                            <div id="faction-list" class="space-y-2 text-sm text-gray-400">目前尚無勢力涉入</div>
                        </div>
                    </div>
                </div>

                <div id="tab-status" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Heroic Attributes</h2>
                    <div id="player-status-container"></div>
                </div>

                <div id="tab-party" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Fellowship</h2>
                    <div id="party-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <div id="tab-inventory" class="tab-pane hidden space-y-8">
                    <h2 class="text-3xl cinzel text-amber-500">Treasury & Gear</h2>
                    <div id="inventory-container"></div>
                </div>
            </div>

            <section id="action-bar" class="bg-gray-800/80 border-t border-gray-700 p-6">
                <div id="choice-buttons" class="grid grid-cols-3 gap-4 mb-4"></div>
                <div class="flex gap-3">
                    <input type="text" id="free-input" placeholder="或是輸入自訂意志..." class="flex-grow bg-black/50 border border-gray-600 rounded px-4 py-2 text-white focus:border-amber-500 outline-none" onkeypress="if(event.key === 'Enter') handleAction()">
                    <button id="submit-btn" onclick="handleAction()" class="btn-fantasy px-8 py-2 rounded font-bold text-amber-500">決斷</button>
                </div>
            </section>
        </main>

        <aside class="w-72 bg-black/80 border-l border-gray-800 p-6 flex flex-col">
            <div class="flex-grow space-y-6">
                <h3 class="cinzel text-amber-600 text-lg border-b border-amber-900/50 pb-2">Fate Tracker</h3>
                <div id="quick-stats" class="space-y-4 text-sm text-gray-300"></div>
            </div>

            <div class="runic-border p-4 rounded bg-gray-900/80 mt-auto">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs cinzel opacity-50">Roll for Destiny</span>
                    <div id="dice-display" class="text-2xl font-black text-amber-500">--</div>
                </div>
                <div id="dice-visual-box" class="w-20 h-20 bg-gray-800 mx-auto rounded-xl flex items-center justify-center border-2 border-gray-600 shadow-lg mb-4 text-3xl font-bold text-white">
                    ?
                </div>
                <div class="grid grid-cols-3 gap-2 text-white">
                    <button onclick="roll(4)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D4</button>
                    <button onclick="roll(6)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D6</button>
                    <button onclick="roll(8)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D8</button>
                    <button onclick="roll(10)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D10</button>
                    <button onclick="roll(12)" class="bg-gray-800 hover:bg-gray-700 py-1 rounded text-xs border border-gray-700">D12</button>
                    <button onclick="roll(20)" class="bg-amber-900/20 border border-amber-600 text-amber-500 py-1 rounded text-xs font-bold">D20</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let chatHistory = [];
        let isGenerating = false; // 新增這行：用來控制神諭之眼的加載鎖定

        const Game = {
            players: [],
            party: [
                { name: "艾莉亞", title: "晨曦祭司", hp: 12, maxHp: 12, stats: { str: 8, dex: 12, con: 12, int: 10, wis: 16, cha: 14 }, skills: ["治療術", "神聖光輝"] }
            ],
            world: "",
            location: "",
            mission: "",
            inventory: { personal: [], party: ["共用帳篷", "乾糧 x10"], gold: 50 }
        };

        const setupState = {
            step: 1,
            count: 1,
            tempHero: { name: "", race: "", class: "", stats: { str:10, dex:10, con:10, int:10, wis:10, cha:10 }, equipment: [] },
            rolledPool: [] 
        };

        // --- 靜態 D&D 5E 規則資料庫 (已全面修正"感知") ---
        const DND_DATA = {
            races: {
                "矮人": {
                    desc: "膽大剛毅的矮人作為老練的戰士、礦工，以及金屬工匠而聞名。體格矮胖壯碩，勇氣與耐力驚人。",
                    bonus: "體質 +2",
                    traits: "速度 25 呎（穿重甲不減速）、黑暗視覺 (60呎)、矮人剛毅（毒性豁免優勢與抗力）、矮人戰鬥訓練、石頭巧藝。",
                    applyBonus: (s) => { s.con += 2; }
                },
                "精靈": {
                    desc: "優雅脫俗、面容姣好，壽命極長。喜愛自由、多樣性與自我表達，擁有發達的口傳文化與美妙旋律。",
                    bonus: "敏捷 +2",
                    traits: "速度 30 呎、黑暗視覺 (60呎)、敏銳感覺（熟練感知）、妖精先祖（抗迷惑、免疫魔法睡眠）、冥想（每日出神 4 小時）。",
                    applyBonus: (s) => { s.dex += 2; }
                },
                "半身人": {
                    desc: "體型嬌小，關注基本需求，性格務實且容易滿足。擅長在巨大的世界中低調生存，具備直截了當的解決手段。",
                    bonus: "敏捷 +2",
                    traits: "速度 25 呎、幸運（骰出 1 點可重骰一次）、勇敢（抗恐慌豁免優勢）、半身人的靈巧（可穿過比自身大的生物空間）。",
                    applyBonus: (s) => { s.dex += 2; }
                },
                "人類": {
                    desc: "遷徙掠地、最具多樣性與適應力的種族。沒有典型特徵，擁有無限的野心與可能性。",
                    bonus: "全能力 +1",
                    traits: "速度 30 呎、自選一門額外語言。全能力值獲得微幅全面提升。",
                    applyBonus: (s) => { s.str += 1; s.dex += 1; s.con += 1; s.int += 1; s.wis += 1; s.cha += 1; }
                },
                "龍人": {
                    desc: "類人生物般站立的巨龍，強壯高大。傳承了巨龍先祖的吐息血脈，陣營傾向非善即惡的極端。",
                    bonus: "力量 +2, 魅力 +1",
                    traits: "速度 30 呎、體格高壯、手腳強壯。傳承古老巨龍之傲，兼具無上威儀與驚人力量。",
                    applyBonus: (s) => { s.str += 2; s.cha += 1; }
                },
                "半獸人": {
                    desc: "繼承歐克血統的突出口吻與魁梧身材。將傷疤視為榮譽與過去功勳的印記，作戰風格兇殘無比。",
                    bonus: "力量 +2, 體質 +1",
                    traits: "速度 30 呎、黑暗視覺 (60呎)、兇惡威迫（熟練威嚇）、殘暴耐力（生命值歸 0 時可改留 1 點）、野蠻攻擊（近戰重擊額外傷害）。",
                    applyBonus: (s) => { s.str += 2; s.con += 1; }
                }
            },
            classes: {
                "牧師": {
                    desc: "神聖魔法的導引者，集治癒振奮魔法與天罰神力於一身。憑藉信仰對神意進行感應。",
                    suggest: "最高分配給感知 (WIS)，次高分配給力量 (STR) 或體質 (CON)。",
                    hpDice: "1D8",
                    save: "感知、魅力",
                    gear: "硬頭錘、鱗甲、輕弩與20支箭、探索者套裝、盾牌、聖徽"
                },
                "野蠻人": {
                    desc: "來自曠野的荒野鬥士，鄙視文明的軟弱。能在戰鬥中汲取原始怒火進入狂暴狀態，實力深不可測。",
                    suggest: "最高分配給力量 (STR)，次高分配給體質 (CON)。",
                    hpDice: "1D12",
                    save: "力量、體質",
                    gear: "巨斧、兩把手斧、探索者套裝、5把標槍"
                },
                "遊俠": {
                    desc: "荒野的致命獵手，專精於追蹤特定宿敵與荒野求生。能驅使與自然調和的魔法，注重速度與隱匿。",
                    suggest: "最高分配給敏捷 (DEX)，次高分配給感知 (WIS)。",
                    hpDice: "1D10",
                    save: "力量、敏捷",
                    gear: "鱗甲、兩柄短劍、地城探險家套裝、長弓與20支箭"
                },
                "法師": {
                    desc: "透過經年累月的研究、魔典記錄與精密計算來掌控祕法的施法者。魔法儲備源於自身的至高智力。",
                    suggest: "最高分配給智力 (INT)，次高分配給體質 (CON) 或敏捷 (DEX)。",
                    hpDice: "1D6",
                    save: "智力、感知",
                    gear: "長棍、材料包、學者套裝、法術書"
                }
            }
        };

        // --- 設定流程渲染控制 ---
        function initSetup() {
            setupState.step = 1;
            showScreen('screen-setup');
            renderSetup();
        }

        function renderSetup() {
            const body = document.getElementById('setup-body');
            const footer = document.getElementById('setup-footer');
            body.innerHTML = '';
            footer.innerHTML = '';

            let backBtn = document.createElement('button');
            backBtn.className = "btn-fantasy px-6 py-2 rounded text-gray-400 font-bold";
            backBtn.innerText = "返回";
            if (setupState.step === 1) {
                backBtn.onclick = () => showScreen('screen-main');
            } else {
                backBtn.onclick = () => { setupState.step--; renderSetup(); };
            }
            footer.appendChild(backBtn);

            let nextContainer = document.createElement('div');

            if (setupState.step === 1) {
                document.getElementById('setup-header').innerText = "Phase I: 旅者的人數";
                body.innerHTML = `
                    <p class="text-gray-400">冒險即將展開，請問有多少位英雄準備踏入此間？</p>
                    <div class="flex gap-4">
                        <button onclick="setPlayerCount(1)" class="btn-fantasy p-4 rounded w-full text-white font-bold">獨行冒險 (1人)</button>
                        <button class="btn-fantasy p-4 rounded w-full opacity-40 cursor-not-allowed text-gray-600">命運雙子 (開發中)</button>
                    </div>
                `;
            } 
            else if (setupState.step === 2) {
                document.getElementById('setup-header').innerText = "Phase II: 世界與法則";
                body.innerHTML = `
                    <p class="text-gray-400 mb-4">請選擇您將要踏入的宏觀架構或法則：</p>
                    <div class="grid grid-cols-1 gap-4 text-white">
                        <button onclick="setWorld('被遺忘的國度 (費倫)')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">被遺忘的國度 (Forgotten Realms)</b><br>
                            <span class="text-sm text-gray-400">標準 5E 劍與魔法，眾神林立與傳奇並存。</span>
                        </button>
                        <button onclick="setWorld('艾伯倫 (魔法龐克)')" class="btn-fantasy text-left p-4 rounded">
                            <b class="text-amber-500">艾伯倫 (Eberron)</b><br>
                            <span class="text-sm text-gray-400">魔法與工業科技並行，充滿黑色電影的陰謀宿命。</span>
                        </button>
                        <button onclick="setWorld('由AI隨機創立世界觀')" class="btn-fantasy text-left p-4 rounded border-amber-600/50">
                            <b class="text-amber-500"><i class="fa-solid fa-dice-d20 text-xs mr-1"></i> 渾沌之始 (未知領域)</b><br>
                            <span class="text-sm text-amber-500/80">【變動機制】將由 AI 隨機創立宏觀世界觀與獨特法則。</span>
                        </button>
                    </div>
                `;
            } 
            else if (setupState.step === 3) {
                document.getElementById('setup-header').innerText = "Phase III: 初始境地與宿命";
                body.innerHTML = `
                    <div class="bg-amber-950/20 border border-amber-900/40 p-4 rounded mb-6 text-sm text-amber-500 flex items-start gap-2">
                        <i class="fa-solid fa-scale-balanced mt-0.5"></i>
                        <span><strong>命運宣告：</strong>起始地點與玩家使命皆會影響故事發展（由 GM 依照 D&D 5E 規則書判定）。</span>
                    </div>
                    <div class="grid grid-cols-2 gap-8 text-white">
                        <div class="space-y-4">
                            <h4 class="text-amber-500 font-bold">起始地點</h4>
                            <select id="start-loc" class="w-full bg-gray-900 p-3 border border-gray-600 rounded outline-none focus:border-amber-500">
                                <option value="喧囂的港口城市 (碼頭暗巷)">港口都市 (都市地形)</option>
                                <option value="偏遠的礦業村落 (法達林荒野)">邊境礦村 (山地地形)</option>
                                <option value="幽暗地底的未知邊緣">地底邊緣 (洞窟地形)</option>
                            </select>
                        </div>
                        <div class="space-y-4">
                            <h4 class="text-amber-500 font-bold">玩家使命</h4>
                            <select id="start-mission" class="w-full bg-gray-900 p-3 border border-gray-600 rounded outline-none focus:border-amber-500">
                                <option value="尋找失蹤血親的孤兒">血親之仇 (身世悲慘)</option>
                                <option value="尋找遠古神器的秘密學者">學者的執念 (知性追求)</option>
                                <option value="躲避帝國追捕的王國逃兵">王國逃兵 (動盪求生)</option>
                            </select>
                        </div>
                    </div>
                `;
                nextContainer.innerHTML = `<button onclick="savePhase3()" class="btn-fantasy px-10 py-2 rounded font-bold text-amber-500">銘刻命運</button>`;
                footer.appendChild(nextContainer);
            } 
            else if (setupState.step === 4) {
                document.getElementById('setup-header').innerText = "Phase IV-1: 英雄的名諱與血脈";
                body.innerHTML = `
                    <div class="space-y-6 text-white">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">英雄姓名</label>

        // --- 核心邏輯函式群 ---
        function setPlayerCount(n) { setupState.count = n; setupState.step = 2; renderSetup(); }
        function setWorld(w) { Game.world = w; setupState.step = 3; renderSetup(); }
        
        function savePhase3() {
            Game.location = document.getElementById('start-loc').value;
            Game.mission = document.getElementById('start-mission').value;
            setupState.step = 4;
            renderSetup();
        }

        function selectRace(r) { setupState.tempHero.race = r; updateRaceUI(r); renderSetup(); }
        function updateRaceUI(r) {
            const box = document.getElementById('race-details-box');
            if(!box) return;
            const data = DND_DATA.races[r];
            box.innerHTML = `
                <div class="text-amber-500 font-bold mb-1">【血脈天賦】${r}（能力修正：${data.bonus}）</div>

                <div class="text-xs text-gray-400"><strong class="text-amber-600/80">特質能力：</strong>${data.traits}</div>
            `;
        }

        function savePhase4Race() {
            let nameInput = document.getElementById('hero-name');
            setupState.tempHero.name = nameInput ? nameInput.value.trim() : "無名者";
            if(!setupState.tempHero.name) setupState.tempHero.name = "無名者";
            
            if(!setupState.tempHero.race) {
                alert("請先選定英雄的種族血脈！");
                return;
            }
            setupState.step = 5;
            renderSetup();
        }

        function selectClass(c) { 
            setupState.tempHero.class = c; 
            renderSetup(); 
        }

        function savePhase4Class() {
            if(!setupState.tempHero.class) {
                alert("請先抉擇英雄的天命職業！");
                return;
            }
            setupState.step = 6;
            renderSetup();
        }

        function executeAttributeRolls() {
            setupState.rolledPool = [];
            for (let i = 0; i < 6; i++) {
                let rolls = [];
                for (let j = 0; j < 4; j++) {
                    rolls.push(Math.floor(Math.random() * 6) + 1);
                }
                rolls.sort((a, b) => b - a); 
                let sumTop3 = rolls[0] + rolls[1] + rolls[2]; 
                setupState.rolledPool.push(sumTop3);
            }
            renderSetup();
        }

        function getDndModifier(score) {
            if (score <= 1) return -5; if (score <= 3) return -4; if (score <= 5) return -3;
            if (score <= 7) return -2; if (score <= 9) return -1; if (score <= 11) return 0;
            if (score <= 13) return 1; if (score <= 15) return 2; if (score <= 17) return 3;
            if (score <= 19) return 4; if (score <= 21) return 5; if (score <= 23) return 6;
            if (score <= 25) return 7; if (score <= 27) return 8; if (score <= 29) return 9;
            return 10;
        }

        function calcModifiers() {
            ['str','dex','con','int','wis','cha'].forEach(key => {
                let select = document.getElementById(`sel-${key}`);
                let modSpan = document.getElementById(`mod-${key}`);
                if(select && modSpan) {
                    let score = parseInt(select.value);
                    let mod = getDndModifier(score);
                    modSpan.innerText = mod >= 0 ? `(+${mod})` : `(${mod})`;
                }
            });
        }

        function finalizeHeroCreation() {
            // --- 新增：數值重複防呆驗證 ---
            let selectedVals = [];
            ['str','dex','con','int','wis','cha'].forEach(key => {
                let select = document.getElementById(`sel-${key}`);
                if(select) selectedVals.push(parseInt(select.value));
            });

            let sortedSelected = selectedVals.sort((a, b) => a - b);
            let sortedPool = setupState.rolledPool.length > 0 
                ? [...setupState.rolledPool].sort((a, b) => a - b) 
                : [8, 10, 12, 13, 14, 15]; // 5E 標準基本陣列

            if (JSON.stringify(sortedSelected) !== JSON.stringify(sortedPool)) {
                alert("【神諭警告】能力值分配有誤！\n\n每項擲骰結果（或基本數值）只能使用一次，不可重複填入。請檢查您的屬性配置。");
                return;
            }
            // --- 結束防呆驗證 ---

            // 正式寫入角色資料
            ['str','dex','con','int','wis','cha'].forEach(key => {
                let select = document.getElementById(`sel-${key}`);
                if(select) {
                    setupState.tempHero.stats[key] = parseInt(select.value);
                }
            });

            const raceData = DND_DATA.races[setupState.tempHero.race];
            raceData.applyBonus(setupState.tempHero.stats);

            const classData = DND_DATA.classes[setupState.tempHero.class];
            let maxHpValue = classData.hpDice === "1D12" ? 12 : (classData.hpDice === "1D10" ? 10 : (classData.hpDice === "1D8" ? 8 : 6));
            let finalHp = maxHpValue + getDndModifier(setupState.tempHero.stats.con);
            if(finalHp <= 0) finalHp = 1;

            const initialGearList = classData.gear.split('、');

            Game.players = [{
                name: setupState.tempHero.name,
                class: setupState.tempHero.class,
                race: setupState.tempHero.race,
                level: 1,
                title: `${setupState.tempHero.race} ${setupState.tempHero.class}`,
                hp: finalHp, maxHp: finalHp,
                stats: { ...setupState.tempHero.stats },
                skills: ["規則熟練"]
            }];

            Game.inventory.personal = initialGearList;

            startGame();
        }

        // --- 畫面與通訊核心 ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function changeTab(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.querySelector(`[onclick="changeTab('${tab}')"]`).classList.add('active-tab');
            
            if(tab === 'status') renderStatus();
            if(tab === 'inventory') renderInventory();
            if(tab === 'party') renderParty();
        }

        function addLog(sender, text) {
            const log = document.getElementById('game-log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${sender === 'GM' ? 'log-gm' : (sender === '系統' ? 'log-system' : 'log-player')}`;
            
            let prefix = sender === 'GM' ? '<i class="fa-solid fa-dragon text-amber-500 mr-2"></i>GM' : (sender === '系統' ? '<i class="fa-solid fa-gear mr-1"></i> 系統' : '玩家');
            entry.innerHTML = `<strong>${prefix}:</strong> <div class="mt-1">${text}</div>`;
            
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function startGame() {
            showScreen('screen-game');
            updateQuickStats();
            
            const p = Game.players[0];
            addLog('系統', `全端架構部署綠燈。核心引擎對接：【Gemini-1.5-Flash】。`);
            document.getElementById('summary-narrative').innerText = `${p.name} (${p.title}) 抵達了 ${Game.location}。`;

            const initPrompt = `請扮演龍與地下城(D&D 5E)的嚴謹GM，所有判定完全參照5etools資料庫。
            【當前戰役設定】
            宏觀世界觀與法則：${Game.world} (若設定為AI隨機創立世界觀，請由你全權隨機生成一個硬核、符合5E風味的奇幻黑暗世界)。
            起點境地：${Game.location}。
            英雄宿命背景：${Game.mission}。
            【玩家英雄角色資訊】
            名諱：${p.name}。種族：${p.race}。天命職業：${p.class}。等級：1。
            當前數值狀態：力量 ${p.stats.str}、敏捷 ${p.stats.dex}、體質 ${p.stats.con}、智力 ${p.stats.int}、感知 ${p.stats.wis}、魅力 ${p.stats.cha}。
            【GM當前任務】
            請根據以上背景與起始條件，撰寫一段極具沉浸感、文字考究的跑團劇本開場。請細緻描繪周遭的環境色調與突發事件，並在最後提供3個具體的行動選擇按鈕建議。`;

            callGameAPI(initPrompt, true);
        }

        async function handleAction(actionText) {
            // 阻止重複加載與點擊
            if (isGenerating) {
                alert("請等待神諭之眼的引導");
                return;
            }

            const input = document.getElementById('free-input');
            const prompt = actionText || input.value;
            if(!prompt) return;
            
            addLog('玩家', prompt);
            if(input) {
                input.value = '';
                input.disabled = true; // 鎖定輸入框
            }

            const btnArea = document.getElementById('choice-buttons');
            btnArea.innerHTML = '<span class="text-gray-500 italic text-sm py-2">命運之輪正在契合運算...</span>';
            document.getElementById('submit-btn').classList.add('opacity-50', 'cursor-not-allowed');

            const systemPrompt = `你是一名嚴謹的D&D 5E GM。玩家剛才的決斷行動是：「${prompt}」。請精確結合玩家的能力值、種族特質及5E規則進行場景判定、描述後續，並在文末照常給出3個建議行動選項。`;
            callGameAPI(systemPrompt, false);
        }

        async function callGameAPI(prompt, isInit = false) {
            // 開啟鎖定狀態，並顯示神諭之眼提示
            isGenerating = true;
            addLog('系統', '<span id="loading-indicator" class="text-amber-500 animate-pulse"><i class="fa-solid fa-eye"></i> 神諭之眼正在指引...</span>');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, history: chatHistory })
                });

                if (!response.ok) throw new Error(`HTTP 錯誤: ${response.status}`);

                const data = await response.json();
                
                // 收到回覆後，移除神諭加載提示
                const indicator = document.getElementById('loading-indicator');
                if(indicator) indicator.parentElement.remove();

                // 使用正則表達式，將 **文字** 替換為 HTML 粗體
                const gmReply = data.reply
                    .replace(/\*\*(.*?)\*\*/g, '<strong class="text-amber-500">$1</strong>')
                    .replace(/\n/g, '<br>');
                
                addLog('GM', gmReply);
                
                chatHistory.push({ role: "user", parts: [{ text: prompt }] });
                chatHistory.push({ role: "model", parts: [{ text: data.reply }] });

                setChoices(["採取進一步行動", "仔細環顧周遭環境", "審視自身當前狀態"]);
                
            } catch (error) {
                console.error("API 連線異常:", error);
                const indicator = document.getElementById('loading-indicator');
                if(indicator) indicator.parentElement.remove();
                addLog('系統', `<span class="text-red-500">神諭之眼連線失敗：${error.message}，請檢視控制台。</span>`);
                setChoices(["重試前次意志", "回到主選單"]);
            } finally {
                // 解除所有鎖定，允許玩家再次行動
                isGenerating = false; 
                document.getElementById('submit-btn').classList.remove('opacity-50', 'cursor-not-allowed');
                const input = document.getElementById('free-input');
                if(input) {
                    input.disabled = false;
                    input.focus();
                }
            }
        }

                <div class="w-full bg-gray-900 h-1.5 mb-4 rounded-full"><div class="bg-red-600 h-full rounded-full" style="width: 100%"></div></div>
                <div class="flex justify-between border-b border-gray-800 pb-2 mb-2"><span>天命稱號</span> <span class="text-amber-500 text-xs font-bold">${p.title}</span></div>
                <div class="flex justify-between border-b border-gray-800 pb-2 mb-2"><span>先攻調整 (DEX)</span> <span class="text-white font-bold">${getDndModifier(p.stats.dex) >= 0 ? '+' : ''}${getDndModifier(p.stats.dex)}</span></div>
                <div class="flex justify-between border-b border-gray-800 pb-2"><span>基本步速</span> <span class="text-white font-bold">${p.race === '矮人' || p.race === '半身人' ? '25 ft' : '30 ft'}</span></div>
            `;
        }

        function setChoices(choices) {
            const btnArea = document.getElementById('choice-buttons');
            btnArea.innerHTML = '';
            choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn-fantasy py-2 px-4 rounded text-xs text-left truncate text-gray-300';
                b.innerText = c;
                b.onclick = () => { if(c === "回到主選單") { showScreen('screen-main'); } else { handleAction(c); } };
                btnArea.appendChild(b);
            });
        }

        function roll(sides) {
            const box = document.getElementById('dice-visual-box');
            const display = document.getElementById('dice-display');
            box.classList.remove('dice-rolling');
            void box.offsetWidth; 
            box.classList.add('dice-rolling');
            box.innerText = "?";
            
            setTimeout(() => {
                const res = Math.floor(Math.random() * sides) + 1;
                box.innerText = res;
                display.innerText = res;
                
                let resultText = `系統代替玩家擲骰 <strong>D${sides}</strong>，結果為：<strong class="text-lg text-white">${res}</strong>`;
                
                if(sides === 20 && res === 20) {
                    box.style.color = "var(--accent-amber)";
                    box.style.borderColor = "var(--accent-amber)";
                    box.style.textShadow = "0 0 10px rgba(212,175,55,0.8)";
                    resultText += ` <span class="text-amber-500 ml-2">★ 大成功 (Critical Success)! ★</span>`;
                } else if(sides === 20 && res === 1) {
                    box.style.color = "#ef4444";
                    box.style.borderColor = "#ef4444";
                    box.style.textShadow = "0 0 10px rgba(239,68,68,0.8)";
                    resultText += ` <span class="text-red-500 ml-2">☠ 大失敗 (Critical Miss)! ☠</span>`;
                } else {
                    box.style.color = "white";
                    box.style.borderColor = "var(--border-runic)";
                    box.style.textShadow = "none";
                }
                
                addLog('系統', resultText);
                
                const input = document.getElementById('free-input');
                input.value = `(擲骰 D${sides} 結果為 ${res}) `;
                input.focus();
                
            }, 600);
        }

        window.onload = () => showScreen('screen-main');
    </script>
</body>
</html>
